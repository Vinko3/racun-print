<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zebra račun</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}
.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}
button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
}

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}
.switch input { display:none; }
.slider {
  position: absolute;
  background-color: #ccc;
  border-radius: 24px;
  top: 0; left: 0; right: 0; bottom: 0;
}
.slider:before {
  content: "";
  position: absolute;
  height: 18px; width: 18px;
  left: 3px; bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: .2s;
}
input:checked + .slider {
  background: black;
}
input:checked + .slider:before {
  transform: translateX(26px);
}
</style>
</head>

<body>

<div class="container">

<h3>Zebra račun</h3>

<input id="ime" placeholder="Ime broda">

<select id="tipNaplate">
  <option value="sat">Po satu</option>
  <option value="noc">Noćna karta</option>
</select>

<select id="vrsta">
  <option value="brod">Brod</option>
  <option value="katamaran">Katamaran</option>
</select>

<select id="duzina">
  <script>
    for(let i=10;i<=20;i++){
      document.write(`<option value="${i}">${i}m</option>`);
    }
  </script>
</select>

<input id="sati" placeholder="Broj sati">

<label>Noćna karta</label><br>
<label class="switch">
  <input type="checkbox" id="dummyToggle" disabled>
  <span class="slider"></span>
</label>

<label style="margin-top:10px;">QR / ZKI / JIR</label><br>
<label class="switch">
  <input type="checkbox" id="useNewQR" checked>
  <span class="slider"></span>
</label>

<input id="zki" placeholder="ZKI">
<input id="jir" placeholder="JIR">
<input id="qr" placeholder="QR link">

<button onclick="generateZPL()">Generiraj ZPL</button>

</div>

<script>

function getStoredOrNew(id, key, useNew) {
  if (useNew) {
    const val = document.getElementById(id).value;
    if (val) localStorage.setItem(key, val);
    return val;
  } else {
    return localStorage.getItem(key) || "";
  }
}

function nowFormat() {
  const d = new Date();
  const p = n => n.toString().padStart(2,"0");
  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}. ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} 1.tiskanje`;
}

function calcPDV(total) {
  const t = parseFloat(total);
  const o = t / 1.25;
  const p = t - o;
  return {
    o: o.toFixed(2).replace(".",","),
    p: p.toFixed(2).replace(".",",")
  };
}

function izracunajCijenu() {
  const tip = document.getElementById("tipNaplate").value;
  const vrsta = document.getElementById("vrsta").value;
  const duzina = parseInt(document.getElementById("duzina").value);
  const sati = parseInt(document.getElementById("sati").value || "0");

  let cijena = 0;

  if (tip === "sat") {
    cijena = duzina <= 10 ? sati * 4 : sati * 7;
  } else {
    cijena = vrsta === "brod" ? duzina * 3 : duzina * 4.5;
  }

  return cijena;
}

function tekstBroda() {
  const vrsta = document.getElementById("vrsta").value;
  const duzina = document.getElementById("duzina").value;

  return vrsta === "katamaran"
    ? `KATAMARAN DO ${duzina}M`
    : `BROD DO ${duzina}M`;
}

function vrijediDo() {
  const tip = document.getElementById("tipNaplate").value;
  const now = new Date();
  let target = new Date();

  if (tip === "noc") {
    target.setDate(now.getDate()+1);
    target.setHours(12,0,0);
  } else {
    const sati = parseInt(document.getElementById("sati").value || "0");
    target = new Date(now.getTime() + sati*3600000);
  }

  const p = n => n.toString().padStart(2,"0");

  return {
    v: `${p(target.getHours())}:${p(target.getMinutes())}:${p(target.getSeconds())}`,
    d: `${p(target.getDate())}.${p(target.getMonth()+1)}.${target.getFullYear()}.`
  };
}

// toggle UI
document.getElementById("tipNaplate").addEventListener("change", function(){
  document.getElementById("sati").style.display = this.value === "noc" ? "none" : "block";
});

document.getElementById("useNewQR").addEventListener("change", function(){
  const dis = !this.checked;
  document.getElementById("zki").disabled = dis;
  document.getElementById("jir").disabled = dis;
  document.getElementById("qr").disabled = dis;
});

function generateZPL() {

  const ime = document.getElementById("ime").value;
  const cijena = izracunajCijenu();
  const ukupno = cijena.toFixed(2).replace(".",",");

  const useNew = document.getElementById("useNewQR").checked;

  const zki = getStoredOrNew("zki","zki",useNew);
  const jir = getStoredOrNew("jir","jir",useNew);
  const qr = getStoredOrNew("qr","qr",useNew);

  const {o, p} = calcPDV(cijena);
  const {v, d} = vrijediDo();
  const time = nowFormat();
  const opis = tekstBroda();

  const zpl = `
^XA
^PW480
^CI28

^CF0,20
^FO20,20^FDGRADSKO PODUZECE d.o.o.^FS
^FO20,45^FDObala J.I.Cote 10^FS
^FO20,70^FDOIB:17036495780^FS

^FO20,110^FDRAČUN BROJ:^FS
^FO20,135^FD151/TIJASNICA/1^FS

^FO20,180^FDZA:^FS
^CF0,42
^FO20,210^FD${ime}^FS

^CF0,20
^FO20,260^FD${opis}^FS
^FO20,285^FDVRIJEDI DO:^FS

^FO260,300^FB200,1,0,R^FD${v}^FS
^FO260,330^FB200,1,0,R^FD${d}^FS

^FO20,370^GB440,1,1^FS

^FO20,390^FDUKUPNO^FS
^FO300,390^FD${ukupno} EUR^FS

^FO20,415^GB440,1,1^FS

^FO20,440^FDOSNOVICA^FS
^FO350,440^FD${o}^FS

^FO20,465^FDPDV (25%)^FS
^FO350,465^FD${p}^FS

^FO20,500^FDNAČIN PLAĆANJA: NOVČANICE^FS

^FO20,540^FDNaplatičar: 8^FS
^FO20,565^FD${time}^FS

^FO20,600^FDZKI:^FS
^FO20,625^FD${zki}^FS

^FO20,660^FDJIR:^FS
^FO20,685^FD${jir}^FS

^FO140,740^BQN,2,5
^FDLA,${qr}^FS

^XZ
`;

  const blob = new Blob([zpl], {type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "racun.zpl";
  a.click();
}

</script>

</body>
</html>
