<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zebra račun</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.container{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  background:black;
  color:white;
  border:none;
  font-size:16px;
  margin-top:12px;
  border-radius:8px;
}

.switch{
  position:relative;
  display:inline-block;
  width:52px;
  height:26px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  cursor:pointer;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:#ccc;
  border-radius:30px;
}

.slider:before{
  position:absolute;
  content:"";
  height:20px;
  width:20px;
  left:3px;
  bottom:3px;
  background:white;
  border-radius:50%;
  transition:.2s;
}

input:checked + .slider{
  background:black;
}

input:checked + .slider:before{
  transform:translateX(26px);
}

.label{
  margin-top:12px;
  display:block;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Zebra račun</h2>

<input id="ime" placeholder="Ime broda">

<select id="tipNaplate">
  <option value="sat">Satna naplata</option>
  <option value="noc">Noćna karta</option>
</select>

<select id="vrsta">
  <option value="brod">Brod</option>
  <option value="katamaran">Katamaran</option>
</select>

<select id="duzina"></select>

<input id="sati" type="number" placeholder="Broj sati">

<label class="label">Novi QR / ZKI / JIR</label>

<label class="switch">
  <input type="checkbox" id="useNewQR" checked>
  <span class="slider"></span>
</label>

<input id="zki" placeholder="ZKI">
<input id="jir" placeholder="JIR">
<input id="qr" placeholder="QR link">

<button onclick="generateZPL()">GENERIRAJ ZPL</button>

</div>

<script>

// DUŽINE
const duzinaSelect = document.getElementById("duzina");

for(let i=10;i<=20;i++){
  duzinaSelect.innerHTML += `<option value="${i}">${i}m</option>`;
}

// QR STORAGE
function getStoredOrNew(id,key,useNew){

  if(useNew){

    const val = document.getElementById(id).value;

    if(val){
      localStorage.setItem(key,val);
    }

    return val;

  }else{

    return localStorage.getItem(key) || "";

  }
}

// DATUM ISPISA
function nowFormat(){

  const d = new Date();

  const p = n => n.toString().padStart(2,"0");

  return `${p(d.getDate())}.${p(d.getMonth()+1)}.${d.getFullYear()}. ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())} 1.tiskanje`;

}

// PDV
function calcPDV(total){

  const osnovica = total / 1.25;
  const pdv = total - osnovica;

  return{
    osnovica: osnovica.toFixed(2).replace(".",","),
    pdv: pdv.toFixed(2).replace(".",",")
  };
}

// IZRAČUN CIJENE
function izracunajCijenu(){

  const tip = document.getElementById("tipNaplate").value;
  const vrsta = document.getElementById("vrsta").value;
  const duzina = parseInt(document.getElementById("duzina").value);
  const sati = parseInt(document.getElementById("sati").value || "0");

  let cijena = 0;

  // SATNA
  if(tip === "sat"){

    if(duzina <= 10){
      cijena = sati * 4;
    }else{
      cijena = sati * 7;
    }

  }

  // NOĆNA
  else{

    if(vrsta === "brod"){
      cijena = duzina * 3;
    }else{
      cijena = duzina * 4.5;
    }

  }

  return cijena;

}

// OPIS
function tekstBroda(){

  const vrsta = document.getElementById("vrsta").value;
  const duzina = document.getElementById("duzina").value;

  if(vrsta === "katamaran"){
    return `KATAMARAN DO ${duzina}M`;
  }

  return `BROD DO ${duzina}M`;

}

// VRIJEDI DO
function vrijediDo(){

  const tip = document.getElementById("tipNaplate").value;

  const now = new Date();

  let target = new Date();

  if(tip === "noc"){

    target.setDate(now.getDate()+1);
    target.setHours(12,0,0);

  }else{

    const sati = parseInt(document.getElementById("sati").value || "0");

    target = new Date(now.getTime() + sati * 60 * 60 * 1000);

  }

  const p = n => n.toString().padStart(2,"0");

  return{
    vrijeme: `${p(target.getHours())}:${p(target.getMinutes())}:${p(target.getSeconds())}`,
    datum: `${p(target.getDate())}.${p(target.getMonth()+1)}.${target.getFullYear()}.`
  };

}

// SATI INPUT SHOW/HIDE
document.getElementById("tipNaplate").addEventListener("change",function(){

  const satInput = document.getElementById("sati");

  if(this.value === "noc"){
    satInput.style.display = "none";
  }else{
    satInput.style.display = "block";
  }

});

// QR DISABLE
document.getElementById("useNewQR").addEventListener("change",function(){

  const disabled = !this.checked;

  document.getElementById("zki").disabled = disabled;
  document.getElementById("jir").disabled = disabled;
  document.getElementById("qr").disabled = disabled;

});

// GENERATE
function generateZPL(){

  const ime = document.getElementById("ime").value;

  const ukupnoBroj = izracunajCijenu();

  const ukupno = ukupnoBroj.toFixed(2).replace(".",",");

  const pdvData = calcPDV(ukupnoBroj);

  const vrijedi = vrijediDo();

  const opis = tekstBroda();

  const time = nowFormat();

  const useNew = document.getElementById("useNewQR").checked;

  const zki = getStoredOrNew("zki","last_zki",useNew);

  const jir = getStoredOrNew("jir","last_jir",useNew);

  const qr = getStoredOrNew("qr","last_qr",useNew);

  const zpl = `
^XA
^PW480
^LL1200
^CI28

^CF0,24
^FO20,20^FDGRADSKO PODUZECE d.o.o.^FS
^FO20,50^FDObala J.I.Cote 10^FS
^FO20,80^FDOIB:17036495780^FS

^FO20,140^FDRAČUN BROJ:^FS
^FO20,170^FD151/TIJASNICA/1^FS

^FO20,230^FDZA:^FS

^CF0,60
^FO20,270^FB440,1,0,R^FD${ime}^FS

^CF0,28
^FO20,340^FD${opis}^FS

^FO20,380^FDVRIJEDI DO:^FS

^CF0,36
^FO220,420^FB220,1,0,R^FD${vrijedi.vrijeme}^FS
^FO220,460^FB220,1,0,R^FD${vrijedi.datum}^FS

^FO20,520^GB440,2,2^FS

^CF0,34
^FO20,540^FDUKUPNO^FS
^FO250,540^FB180,1,0,R^FD${ukupno} EUR^FS

^FO20,590^GB440,2,2^FS

^CF0,28
^FO20,630^FDOSNOVICA^FS
^FO300,630^FB120,1,0,R^FD${pdvData.osnovica}^FS

^FO20,670^FDPDV (25%)^FS
^FO300,670^FB120,1,0,R^FD${pdvData.pdv}^FS

^FO20,730^FDNAČIN PLAĆANJA: NOVČANICE^FS

^FO20,800^FDNaplatičar: 8^FS
^FO20,840^FD${time}^FS

^FO20,920^FDZKI:^FS
^FO20,955^FD${zki}^FS

^FO20,1020^FDJIR:^FS
^FO20,1055^FD${jir}^FS

^FO120,1120^BQN,2,7
^FDLA,${qr}^FS

^XZ
`;

  const blob = new Blob([zpl], {type:"text/plain"});

  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);

  a.download = "racun.zpl";

  a.click();

}

</script>

</body>
</html>
