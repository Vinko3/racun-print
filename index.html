<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zebra ZPL Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}
.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Zebra račun</h2>

<input id="ime_broda" placeholder="Ime broda">
<input id="vrijeme" placeholder="Vrijeme (npr 12:00:00)">
<input id="datum" placeholder="Datum (npr 01.06.2025)">
<input id="ukupno" placeholder="Ukupno (npr 36,00)">
<input id="osnovica" placeholder="Osnovica">
<input id="pdv" placeholder="PDV">
<input id="datum_ispisa" placeholder="Datum i vrijeme ispisa">
<input id="zki" placeholder="ZKI">
<input id="jir" placeholder="JIR">
<input id="qr" placeholder="QR link">
<label style="display:flex;align-items:center;margin-top:10px;">
<input type="checkbox" id="useNewQR" checked style="margin-right:10px;">
  Unesi novi QR / ZKI / JIR
</label>
<button onclick="generateZPL()">Generiraj ZPL</button>

</div>
  <label style="display:flex;align-items:center;margin-top:10px;">
  <input type="checkbox" id="nightTicket" style="margin-right:10px;">
  Noćna karta
</label>
  <input id="sati" placeholder="Broj sati (npr 3)">
<script>
function formatDateTime() {
  const now = new Date();

  const pad = (n) => n.toString().padStart(2, '0');

  const day = pad(now.getDate());
  const month = pad(now.getMonth() + 1);
  const year = now.getFullYear();

  const hours = pad(now.getHours());
  const minutes = pad(now.getMinutes());
  const seconds = pad(now.getSeconds());

  return `${day}.${month}.${year}. ${hours}:${minutes}:${seconds} 1.tiskanje`;
}

function calculatePDV(total) {
  const ukupno = parseFloat(total.replace(",", "."));
  if (isNaN(ukupno)) return { osnovica: "0,00", pdv: "0,00" };

  const osnovica = ukupno / 1.25;
  const pdv = ukupno - osnovica;

  return {
    osnovica: osnovica.toFixed(2).replace(".", ","),
    pdv: pdv.toFixed(2).replace(".", ",")
  };
}

function getVrijediDo() {
  const isNight = document.getElementById("nightTicket").checked;
  const now = new Date();

  let target = new Date();

  if (isNight) {
    // sutra u 12:00
    target.setDate(now.getDate() + 1);
    target.setHours(12, 0, 0);
  } else {
    const sati = parseInt(document.getElementById("sati").value || "0");
    target = new Date(now.getTime() + sati * 60 * 60 * 1000);
  }

  const pad = (n) => n.toString().padStart(2, "0");

  const vrijeme = `${pad(target.getHours())}:${pad(target.getMinutes())}:${pad(target.getSeconds())}`;
  const datum = `${pad(target.getDate())}.${pad(target.getMonth() + 1)}.${target.getFullYear()}.`;

  return { vrijeme, datum };
}

function formatDateTime() {
  const now = new Date();
  const pad = (n) => n.toString().padStart(2, "0");

  return `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}. ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())} 1.tiskanje`;
}

function generateZPLString() {
  const useNew = document.getElementById("useNewQR").checked;

  const zki = getStoredOrNew("zki", "last_zki", useNew);
  const jir = getStoredOrNew("jir", "last_jir", useNew);
  const qr = getStoredOrNew("qr", "last_qr", useNew);

  const ime = document.getElementById("ime_broda").value;
  const ukupno = document.getElementById("ukupno").value;

  const { osnovica, pdv } = calculatePDV(ukupno);
  const { vrijeme, datum } = getVrijediDo();
  const datumIspisa = formatDateTime();

  return `
^XA
^PW480
^LL2000
^CI28

^CF0,20
^FO20,20^FDGRADSKO PODUZECE d.o.o.^FS
^FO20,42^FDObala J.I.Cote 10^FS
^FO20,64^FDOIB:17036495780^FS

^FO20,110^FDRAČUN BROJ:^FS
^CF0,22
^FO20,132^FD151/TIJASNICA/1^FS

^CF0,20
^FO20,175^FDZA:^FS

^CF0,42
^FO20,200^FD${ime}^FS

^CF0,20
^FO20,250^FDBROD DO 12M^FS

^FO20,275^FDVRIJEDI DO:^FS

^CF0,28
^FO20,300^FD${vrijeme}^FS
^FO20,330^FD${datum}^FS

^FO20,370^GB440,1,1^FS

^CF0,24
^FO20,390^FDUKUPNO^FS
^FO330,390^FD${ukupno} EUR^FS

^FO20,415^GB440,1,1^FS

^CF0,20
^FO20,440^FDOSNOVICA^FS
^FO350,440^FD${osnovica}^FS

^FO20,465^FDPDV (25%)^FS
^FO350,465^FD${pdv}^FS

^FO20,500^FDNAČIN PLAĆANJA: NOVČANICE^FS

^FO20,540^FDNaplatičar: 8^FS
^FO20,565^FD${datumIspisa}^FS

^FO20,600^FDZKI:^FS
^FO20,625^FD${zki}^FS

^FO20,660^FDJIR:^FS
^FO20,685^FD${jir}^FS

^FO140,740^BQN,2,5
^FDLA,${qr}^FS

^XZ
`;
}
  const blob = new Blob([zpl], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "racun.zpl";
  link.click();
}
</script>

</body>
</html>
