<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zebra ZPL Generator</title>

<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f5f5;
}
.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  font-size: 16px;
}
button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Zebra račun</h2>

<input id="ime_broda" placeholder="Ime broda">
<input id="vrijeme" placeholder="Vrijeme (npr 12:00:00)">
<input id="datum" placeholder="Datum (npr 01.06.2025)">
<input id="ukupno" placeholder="Ukupno (npr 36,00)">
<input id="osnovica" placeholder="Osnovica">
<input id="pdv" placeholder="PDV">
<input id="datum_ispisa" placeholder="Datum i vrijeme ispisa">
<input id="zki" placeholder="ZKI">
<input id="jir" placeholder="JIR">
<input id="qr" placeholder="QR link">

<button onclick="generateZPL()">Generiraj ZPL</button>

</div>
<script>
function formatDateTime() {
  const now = new Date();

  const pad = (n) => n.toString().padStart(2, '0');

  const day = pad(now.getDate());
  const month = pad(now.getMonth() + 1);
  const year = now.getFullYear();

  const hours = pad(now.getHours());
  const minutes = pad(now.getMinutes());
  const seconds = pad(now.getSeconds());

  return `${day}.${month}.${year}. ${hours}:${minutes}:${seconds} 1.tiskanje`;
}

function generateZPL() {
  const data = {
    ime: document.getElementById("ime_broda").value,
    vrijeme: document.getElementById("vrijeme").value,
    datum: document.getElementById("datum").value,
    ukupno: document.getElementById("ukupno").value,
    osnovica: document.getElementById("osnovica").value,
    pdv: document.getElementById("pdv").value,
    zki: document.getElementById("zki").value,
    jir: document.getElementById("jir").value,
    qr: document.getElementById("qr").value
  };

  const datumIspisa = formatDateTime();

  const zpl = `
^XA
^PW480
^LL2000
^CI28

^CF0,20
^FO20,20^FDGRADSKO PODUZECE d.o.o.^FS
^FO20,42^FDObala J.I.Cote 10^FS
^FO20,64^FDOIB:17036495780^FS

^FO20,110^FDRAČUN BROJ:^FS
^CF0,22
^FO20,132^FD151/TIJASNICA/1^FS

^CF0,20
^FO20,175^FDZA:^FS

^CF0,42
^FO20,200^FD${data.ime}^FS

^CF0,20
^FO20,250^FDBROD DO 12M^FS

^FO20,275^FDVRIJEDI DO:^FS

^CF0,28
^FO20,300^FD${data.vrijeme}^FS
^FO20,330^FD${data.datum}^FS

^FO20,370^GB440,1,1^FS

^CF0,24
^FO20,390^FDUKUPNO^FS
^FO330,390^FD${data.ukupno} EUR^FS

^FO20,415^GB440,1,1^FS

^CF0,20
^FO20,440^FDOSNOVICA^FS
^FO350,440^FD${data.osnovica}^FS

^FO20,465^FDPDV (25%)^FS
^FO350,465^FD${data.pdv}^FS

^FO20,500^FDNAČIN PLAĆANJA: NOVČANICE^FS

^FO20,540^FDNaplatičar: 8^FS
^FO20,565^FD${datumIspisa}^FS

^FO20,600^FDZKI:^FS
^FO20,625^FD${data.zki}^FS

^FO20,660^FDJIR:^FS
^FO20,685^FD${data.jir}^FS

^FO140,740^BQN,2,5
^FDLA,${data.qr}^FS

^XZ
`;

  const blob = new Blob([zpl], { type: "text/plain" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "racun.zpl";
  link.click();
}
</script>

</body>
</html>
